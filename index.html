<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Something</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; }

    canvas#canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    #btn-fullscreen {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.45);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    #btn-fullscreen:hover,
    #btn-fullscreen:active {
      background: rgba(0, 0, 0, 0.7);
    }
    #btn-fullscreen img {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <button id="btn-fullscreen" title="Fullscreen" aria-label="Toggle fullscreen">
    <img src="assets/fullscreen.png" alt="fullscreen">
  </button>

  <script>
    (function () {
      var canvas = document.getElementById('canvas');

      function fitCanvas() {
        var vp = window.visualViewport;
        var x = vp ? Math.round(vp.offsetLeft) : 0;
        var y = vp ? Math.round(vp.offsetTop)  : 0;
        canvas.style.left = x + 'px';
        canvas.style.top  = y + 'px';
      }

      fitCanvas();

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', fitCanvas);
        window.visualViewport.addEventListener('scroll', fitCanvas);
      } else {
        window.addEventListener('resize', fitCanvas);
      }
    })();

    (function () {
      var btn = document.getElementById('btn-fullscreen');

      function isFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement);
      }

      function enterFullscreen() {
        var el = document.documentElement;
        if      (el.requestFullscreen)       el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      }

      function exitFullscreen() {
        if      (document.exitFullscreen)       document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }

      btn.addEventListener('click', function () {
        isFullscreen() ? exitFullscreen() : enterFullscreen();
      });

      ['fullscreenchange', 'webkitfullscreenchange'].forEach(function (evt) {
        document.addEventListener(evt, function () {
          btn.style.display = isFullscreen() ? 'none' : '';
        });
      });

      var isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
      if (isIOS) btn.style.display = 'none';
    })();

    var Module = {
      canvas: document.getElementById('canvas')
    };
  </script>

  <script async type="text/javascript" src="index.js"></script>
</body>
</html>
